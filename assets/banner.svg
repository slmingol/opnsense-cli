<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#161B22" stroke-width="0.8"/>
    </pattern>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#D94F00" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="rgba(0,0,0,0.18)"/>
    </pattern>
  </defs>

  <rect width="1200" height="280" fill="#0D1117"/>
  <rect width="1200" height="280" fill="url(#grid)" opacity="0.7"/>

  <rect x="0" y="0" width="4" height="280" fill="#D94F00"/>
  <rect x="0" y="0" width="4" height="280" fill="#D94F00" filter="url(#glow)" opacity="0.5"/>

  <rect x="56" y="28" width="1120" height="224" rx="6" fill="#0D1117" stroke="#21262D" stroke-width="1.2"/>
  <rect x="56" y="28" width="1120" height="34" rx="6" fill="#161B22"/>
  <rect x="56" y="50" width="1120" height="12" fill="#161B22"/>

  <circle cx="82"  cy="45" r="5.5" fill="#3A3F47"/>
  <circle cx="102" cy="45" r="5.5" fill="#3A3F47"/>
  <circle cx="122" cy="45" r="5.5" fill="#D94F00" opacity="0.8"/>

  <text x="600" y="49.5" font-family="'Courier New', Courier, monospace" font-size="11.5" fill="#4D545E" text-anchor="middle" letter-spacing="0.5">opnsense-cli  ·  opnsense-rtr1.bub.lan</text>

  <line x1="56" y1="62" x2="1176" y2="62" stroke="#21262D" stroke-width="1"/>

  <text x="84"  y="94" font-family="'Courier New', Courier, monospace" font-size="13" fill="#D94F00" font-weight="bold">❯</text>
  <text x="102" y="94" font-family="'Courier New', Courier, monospace" font-size="13" fill="#6E7681">opnsense</text>
  <text x="185" y="94" font-family="'Courier New', Courier, monospace" font-size="13" fill="#4D545E">--help</text>
  <rect x="230" y="82" width="8" height="14" fill="#D94F00" opacity="0.7"/>

  <text x="600" y="161"
    font-family="'Courier New', Courier, monospace"
    font-size="58"
    font-weight="bold"
    fill="#E6EDF3"
    text-anchor="middle"
    letter-spacing="-1"
    filter="url(#glow)">opnsense-cli</text>

  <text x="600" y="193"
    font-family="'Courier New', Courier, monospace"
    font-size="14"
    fill="#4D545E"
    text-anchor="middle"
    letter-spacing="2">A CLI tool to manage OPNsense via REST API</text>

  <g font-family="'Courier New', Courier, monospace" font-size="11.5" fill="#6E7681">
    <rect x="84"  y="214" width="76"  height="20" rx="3" fill="#161B22" stroke="#21262D" stroke-width="1"/>
    <rect x="172" y="214" width="60"  height="20" rx="3" fill="#161B22" stroke="#21262D" stroke-width="1"/>
    <rect x="244" y="214" width="82"  height="20" rx="3" fill="#161B22" stroke="#21262D" stroke-width="1"/>
    <rect x="338" y="214" width="90"  height="20" rx="3" fill="#161B22" stroke="#21262D" stroke-width="1"/>
    <rect x="440" y="214" width="78"  height="20" rx="3" fill="#161B22" stroke="#21262D" stroke-width="1"/>
    <rect x="530" y="214" width="96"  height="20" rx="3" fill="#161B22" stroke="#21262D" stroke-width="1"/>
    <rect x="638" y="214" width="70"  height="20" rx="3" fill="#161B22" stroke="#21262D" stroke-width="1"/>
    <rect x="720" y="214" width="104" height="20" rx="3" fill="#161B22" stroke="#21262D" stroke-width="1"/>
    <rect x="836" y="214" width="58"  height="20" rx="3" fill="#161B22" stroke="#21262D" stroke-width="1"/>
    <rect x="906" y="214" width="94"  height="20" rx="3" fill="#161B22" stroke="#21262D" stroke-width="1"/>

    <text x="122" y="228" text-anchor="middle">dns</text>
    <text x="202" y="228" text-anchor="middle">dhcp</text>
    <text x="285" y="228" text-anchor="middle">firewall</text>
    <text x="383" y="228" text-anchor="middle">ha-proxy</text>
    <text x="479" y="228" text-anchor="middle">certs</text>
    <text x="578" y="228" text-anchor="middle">wireguard</text>
    <text x="673" y="228" text-anchor="middle">nordvpn</text>
    <text x="772" y="228" text-anchor="middle">bulk import</text>
    <text x="865" y="228" text-anchor="middle">config</text>
    <text x="953" y="228" text-anchor="middle">node.js · rest</text>
  </g>

  <rect width="1200" height="280" fill="url(#scan)" opacity="0.35"/>
</svg>
